# yaml-language-server: $schema=../../../schemas/v2.json
version: 2

account:
  name: Test Account
  host_url: https://cloud.getdbt.com

globals:
  connections:
    - key: test_connection
      name: Test Connection
      type: databricks
  repositories:
    - key: test_repo
      remote_url: https://github.com/test-org/test-repo.git

projects:
  - key: test_project
    name: test_project
    repository: test_repo
    environments:
      - key: development
        name: Development
        type: development
        connection: test_connection
        credential:
          token_name: dev_token
          schema: dev
        dbt_version: "1.5.0"
        jobs:
          - key: test_run
            name: test_run
            environment_key: development
            execute_steps:
              - "dbt run"
            triggers:
              schedule: false
              github_webhook: false
              git_provider_webhook: false
              on_merge: false

